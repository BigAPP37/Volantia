<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Steering wheel -->
  <circle cx="256" cy="240" r="150" stroke="white" stroke-width="22" fill="none"/>
  <circle cx="256" cy="240" r="52" stroke="white" stroke-width="18" fill="none"/>
  <!-- Spokes -->
  <line x1="256" y1="188" x2="256" y2="90" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <line x1="211" y1="266" x2="130" y2="314" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <line x1="301" y1="266" x2="382" y2="314" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Road dashes -->
  <rect x="244" y="320" width="24" height="50" rx="6" fill="white" opacity="0.7"/>
  <rect x="244" y="390" width="24" height="35" rx="6" fill="white" opacity="0.5"/>
  <rect x="244" y="440" width="24" height="20" rx="6" fill="white" opacity="0.3"/>
</svg>
