<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>
  <!-- Icon: Steering wheel with road -->
  <g transform="translate(5, 5)">
    <!-- Outer circle (steering wheel) -->
    <circle cx="25" cy="25" r="23" stroke="url(#logoGrad)" stroke-width="3" fill="none"/>
    <!-- Inner circle -->
    <circle cx="25" cy="25" r="8" stroke="url(#logoGrad)" stroke-width="2.5" fill="none"/>
    <!-- Spokes -->
    <line x1="25" y1="17" x2="25" y2="2" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="18" y1="29" x2="6" y2="37" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="32" y1="29" x2="44" y2="37" stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Road lines inside wheel -->
    <rect x="23.5" y="28" width="3" height="6" rx="1" fill="#3B82F6" opacity="0.6"/>
    <rect x="23.5" y="37" width="3" height="4" rx="1" fill="#3B82F6" opacity="0.4"/>
  </g>
  <!-- Text: Volantia -->
  <text x="62" y="38" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="28" font-weight="700" fill="currentColor" letter-spacing="-0.5">
    Volantia
  </text>
  <!-- Subtitle -->
  <text x="63" y="52" font-family="'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="9" font-weight="400" fill="currentColor" opacity="0.5" letter-spacing="3">
    CONTROL HORARIO
  </text>
</svg>
